name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q plugins tests
      - name: Run tests
        run: python -m unittest discover -s tests -v

  plugin-lifecycle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install the Codex CLI used by the lifecycle test
        run: npm install --global @openai/codex@0.142.5
      - name: Smoke-test install, upgrade, discovery, and configuration
        run: python tests/plugin_lifecycle_smoke.py
